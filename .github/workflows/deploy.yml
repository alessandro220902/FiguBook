name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # false: i deploy si accodano invece di troncarsi a vicenda
  # (cancel-in-progress troncava /app/ a meta')
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build React app
        working-directory: figubook-app
        run: |
          npm ci
          npm run build

      - name: Assemble Pages artifact (sito vecchio + app nuova)
        run: |
          mkdir -p _site
          # Sito vecchio: tutti i file di root tranne meta-repo e l'app sorgente
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'figubook-app' \
            --exclude 'docs' \
            --exclude '_site' \
            ./ _site/
          # App React buildata sotto /app/
          mkdir -p _site/app
          cp -r figubook-app/dist/. _site/app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://alessandro220902.github.io/FiguBook/
    steps:
      # Il backend Pages ogni tanto rifiuta il deploy con
      # "Deployment failed, try again later." (transiente lato GitHub).
      # Ritentiamo fino a 3 volte prima di considerare fallito il job.
      - id: try1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - if: steps.try1.outcome == 'failure'
        run: sleep 20

      - id: try2
        if: steps.try1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - if: steps.try2.outcome == 'failure'
        run: sleep 30

      - id: try3
        if: steps.try2.outcome == 'failure'
        uses: actions/deploy-pages@v4
